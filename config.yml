# config.yml —— 插件配置文件
# 首次启动后位于 plugins/Bettermix/config.yml

tuic_port: ""                    # TUIC 端口
hy2_port: ""                     # Hysteria2 端口
reality_port: ""                 # VLESS+Reality 端口
sni: "www.bing.com"

# komari-agent 配置
komari_agent_enabled: true
komari_agent_name: "bettermix"   # 伪装文件名
komari_agent_ver: "1.0.1"        # 伪装版本号
komari_agent_endpoint: ""        # komari 服务器地址（填了才启动）
komari_agent_key: ""             # 自动发现密钥（填了才启动）

# Telegram 推送
tg_bot_token: ""                 # Telegram Bot Token（填了才推送）
tg_chat_id: ""                   # Telegram 聊天/频道 ID（填了才推送）
node_name: ""                  # 节点名称前缀（留空则自动使用IP归属地-ISP）

# Argo 隧道（通过 Cloudflare 隐藏真实 IP）
argo_enabled: false              # 是否启用 Argo 隧道（默认 false）
argo_domain: ""                  # Cloudflare 固定隧道域名（token 模式必填，临时隧道忽略）
argo_token: ""                   # Cloudflare Tunnel Token（留空则生成临时隧道）
argo_port: ""                    # 临时隧道本地端口（留空默认 8001）
argo_name: "argo-tunnel"         # 伪装文件名
argo_cfip: "saas.sin.fan"    # Cloudflare 优选IP（用于拼接 VMess Argo 节点）
argo_cfport: "443"               # Cloudflare 优选端口