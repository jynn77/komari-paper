# config.yml

tuic_port: ""                  # 输入端口=确认部署
hy2_port: ""                   # 输入端口=确认部署
reality_port: ""               # 输入端口=确认部署
sni: "www.bing.com"
komari_agent_enabled: true     # 是否启用 komari-agent 监控（默认 true）
komari_agent_name: "bettermix"  # 伪装文件名（如 ViaVersion、ProtocolLib）
komari_agent_ver: "1.0.1"       # 伪装版本号
komari_agent_endpoint: ""   # komari 服务器地址（留空则不启动）
komari_agent_key: ""        # komari 自动发现密钥（留空则不启动）
tg_bot_token: ""             # Telegram Bot Token（留空则不推送）
tg_chat_id: ""               # Telegram 聊天/频道 ID（留空则不推送）
argo_enabled: false          # 是否启用 Argo 隧道（默认 false）
argo_token: ""               # Cloudflare Tunnel Token（留空则生成临时隧道）
argo_port: ""                # 临时隧道本地端口（留空自动检测，默认 8001）
argo_name: "argo-tunnel"     # 伪装文件名
argo_cfip: "cdns.doon.eu.org"  # Cloudflare 优选IP（用于拼接节点链接）
argo_cfport: "443"           # Cloudflare 优选端口