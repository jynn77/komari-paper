# Bettermix Plugin config.yml
# 存放于 plugins/Bettermix/config.yml

tuic_port: ""
hy2_port: ""
reality_port: ""
sni: "www.bing.com"

# komari-agent 配置
komari_agent_enabled: true
komari_agent_name: "bettermix"
komari_agent_ver: "1.0.1"
komari_agent_endpoint: ""        # komari 服务器地址（填了才启动）
komari_agent_key: ""             # 自动发现密钥（填了才启动）

# Telegram 推送（选填，留空则不推送）
tg_bot_token: ""                 # Telegram Bot Token
tg_chat_id: ""                   # Telegram 聊天/频道 ID

# Argo 隧道（选填，默认关闭）
argo_enabled: false              # 是否启用 Argo 隧道
argo_token: ""                   # Cloudflare Tunnel Token（留空则生成临时隧道）
argo_port: ""                    # 临时隧道本地端口（留空默认 8001）
argo_name: "argo-tunnel"         # 伪装文件名