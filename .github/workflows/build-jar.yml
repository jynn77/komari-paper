name: Build server.jar

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 设置 Gradle 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建项目（生成 server.jar）
        run: ./gradlew build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: build/libs/server.jar
          retention-days: 30

      - name: 创建 Release 并上传 JAR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "自动构建 #${{ github.run_number }}"
          body: |
            ## 自动构建 #${{ github.run_number }}

            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.event.head_commit.timestamp || github.run_id }}
            - 包含: sing-box 自动下载 + komari-agent 自动启动

            ### 使用方法
            1. 下载 `server.jar`
            2. 下载 `config.yml` 并配置端口
            3. 上传到 Minecraft 托管面板，启动即可
          files: build/libs/server.jar
          generate_release_notes: false